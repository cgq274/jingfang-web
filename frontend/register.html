<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>敬方教育 - 用户注册</title>
  <script src="./js/tailwindcss.js"></script>
  <script src="./js/iconify-icon.min.js"></script>
</head>
<body>
  <style type="text/tailwindcss" id="register-styles-root">
    @layer base {
      :root {
        --primary: #1e40af;
        --secondary: #0ea5e9;
        --accent: #8b5cf6;
        --success: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;
      }
      
      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
    }
    
    @layer utilities {
      .gradient-bg {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }
      
      .shadow-soft {
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }
      
      .shadow-hard {
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      }
    }
  </style>

  <div class="min-h-screen bg-gradient-to-b from-gray-50 to-white flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
      <!-- Logo 和标题 -->
      <div class="text-center mb-8">
        <div class="w-16 h-16 rounded-full gradient-bg flex items-center justify-center mx-auto mb-4">
          <iconify-icon icon="ph:graduation-cap-fill" class="text-3xl text-white"></iconify-icon>
        </div>
        <h2 class="text-3xl font-bold text-gray-900">注册敬方教育</h2>
        <p class="text-gray-600 mt-2">创建您的账号，开启金融学习之旅</p>
      </div>

      <!-- 注册表单 -->
      <div class="bg-white rounded-2xl shadow-hard p-8">
        <form id="register-form" class="space-y-6">
          <div>
            <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
              用户名 <span class="text-red-500">*</span>
            </label>
            <input
              type="text"
              id="username"
              name="username"
              required
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
              placeholder="请输入用户名"
            />
          </div>

          <div>
            <label for="phone" class="block text-sm font-medium text-gray-700 mb-2">
              手机号 <span class="text-red-500">*</span>
            </label>
            <div class="flex gap-2">
              <input
                type="tel"
                id="phone"
                name="phone"
                required
                maxlength="11"
                class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                placeholder="请输入11位手机号"
                pattern="^1[3-9]\d{9}$"
              />
              <button
                type="button"
                id="send-code-btn"
                class="px-6 py-3 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition-colors duration-200 whitespace-nowrap"
              >
                发送验证码
              </button>
            </div>
            <p class="mt-1 text-sm text-gray-500">请输入11位手机号</p>
          </div>

          <div>
            <label for="verification-code" class="block text-sm font-medium text-gray-700 mb-2">
              短信验证码 <span class="text-red-500">*</span>
            </label>
            <input
              type="text"
              id="verification-code"
              name="verification-code"
              required
              maxlength="6"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
              placeholder="请输入6位验证码"
              pattern="\d{6}"
            />
          </div>

          <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
              邮箱（可选）
            </label>
            <input
              type="email"
              id="email"
              name="email"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
              placeholder="请输入邮箱地址"
            />
          </div>

          <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
              密码 <span class="text-red-500">*</span>
            </label>
            <input
              type="password"
              id="password"
              name="password"
              required
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
              placeholder="至少6位字符"
              minlength="6"
            />
            <p class="mt-1 text-sm text-gray-500">密码长度至少6位</p>
          </div>

          <div>
            <label for="confirm-password" class="block text-sm font-medium text-gray-700 mb-2">
              确认密码 <span class="text-red-500">*</span>
            </label>
            <input
              type="password"
              id="confirm-password"
              name="confirm-password"
              required
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
              placeholder="请再次输入密码"
              minlength="6"
            />
          </div>

          <div class="flex items-center">
            <input
              type="checkbox"
              id="agree"
              name="agree"
              required
              class="h-4 w-4 text-blue-600 rounded"
            />
            <label for="agree" class="ml-2 text-sm text-gray-600">
              我已阅读并同意
              <a href="#" class="text-blue-600 hover:text-blue-800">《用户协议》</a>
              和
              <a href="#" class="text-blue-600 hover:text-blue-800">《隐私政策》</a>
            </label>
          </div>

          <button
            type="submit"
            id="submit-register"
            class="w-full py-3 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-medium rounded-lg hover:from-blue-700 hover:to-indigo-700 transition-all duration-300 shadow-md hover:shadow-lg"
          >
            立即注册
          </button>

          <div class="text-center pt-4 border-t border-gray-200">
            <p class="text-gray-600">
              已有账号？
              <a href="index.html" class="text-blue-600 font-medium hover:text-blue-800">立即登录</a>
            </p>
          </div>
        </form>

        <!-- 消息提示 -->
        <div id="register-message" class="mt-4 hidden">
          <div id="register-message-inner" class="p-4 rounded-lg bg-blue-50 border border-blue-200">
            <div class="flex items-center">
              <iconify-icon icon="heroicons:information-circle" class="text-blue-600 text-xl mr-2"></iconify-icon>
              <p id="message-text" class="text-blue-800"></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/register-auth.js"></script>
</body>
</html>
