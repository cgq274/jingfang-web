<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>敬方教育 - 视频上传</title>
    <script src="./js/tailwindcss.js"></script>
    <script src="./js/iconify-icon.min.js"></script>
    <style type="text/tailwindcss">
      @layer components {
        .form-card {
          @apply bg-white rounded-xl border border-gray-200/80 shadow-sm overflow-hidden;
        }
        .form-section-title {
          @apply text-sm font-semibold text-gray-900 tracking-tight mb-4 pb-2 border-b border-gray-100;
        }
        .form-label {
          @apply block text-sm font-medium text-gray-700 mb-1.5;
        }
        .form-input {
          @apply w-full px-3.5 py-2.5 text-sm text-gray-900 placeholder-gray-400 bg-white border border-gray-300 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500;
        }
        .form-input:hover {
          @apply border-gray-400;
        }
        .form-hint {
          @apply mt-1.5 text-xs text-gray-500 leading-relaxed;
        }
        .btn-primary {
          @apply inline-flex items-center justify-center gap-2 px-5 py-2.5 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors disabled:opacity-60 disabled:pointer-events-none;
        }
        .btn-ghost {
          @apply inline-flex items-center justify-center gap-2 px-5 py-2.5 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-gray-400/20 focus:border-gray-400 transition-colors;
        }
        .upload-zone {
          @apply border-2 border-dashed border-gray-300 rounded-xl p-8 text-center transition-colors hover:border-blue-400;
        }
      }
    </style>
  </head>
  <body class="min-h-screen bg-gray-50/80 antialiased">
    <div class="min-h-screen">
      <!-- 顶栏（编辑模式下由 JS 隐藏） -->
      <header id="video-form-header" class="sticky top-0 z-10 bg-white border-b border-gray-200/80">
        <div class="px-4 sm:px-6 py-4">
          <nav class="flex items-center gap-2 text-sm text-gray-500 mb-1">
            <a href="admin.html" class="hover:text-gray-700 transition-colors">后台</a>
            <iconify-icon icon="heroicons:chevron-right" class="text-gray-400 text-base"></iconify-icon>
            <a href="admin.html" class="hover:text-gray-700 transition-colors">视频管理</a>
            <iconify-icon icon="heroicons:chevron-right" class="text-gray-400 text-base"></iconify-icon>
            <span class="text-gray-900 font-medium">视频上传</span>
          </nav>
          <div class="flex items-center gap-3">
            <a href="admin.html" class="flex items-center justify-center w-9 h-9 rounded-lg text-gray-500 hover:bg-gray-100 hover:text-gray-700 transition-colors" title="返回后台">
              <iconify-icon icon="heroicons:arrow-left" class="text-xl"></iconify-icon>
            </a>
            <div>
              <h1 class="text-xl font-semibold text-gray-900">视频上传</h1>
            </div>
          </div>
        </div>
      </header>

      <main class="max-w-2xl mx-auto px-4 sm:px-6 py-8">
        <div class="form-card">
          <form id="video-upload-form" class="p-6 sm:p-8">
            <!-- 视频文件（新建时显示） -->
            <div id="video-file-section" class="mb-8">
              <h2 class="form-section-title">视频文件</h2>
              <div class="upload-zone mb-4">
                <iconify-icon icon="heroicons:cloud-arrow-up" class="text-4xl text-gray-400 mb-3"></iconify-icon>
                <p class="text-gray-600 text-sm mb-2">选择视频文件，系统将通过腾讯云 COS 存储</p>
                <p class="text-xs text-gray-500 mb-3">支持 MP4 等常见格式，建议单文件 1GB 以内</p>
                <input id="video-file-input" type="file" accept="video/*" class="block w-full max-w-xs mx-auto text-sm text-gray-600 file:mr-2 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                <p id="video-file-status" class="text-xs text-gray-500 mt-2">未选择文件</p>
              </div>
            </div>

            <!-- 基本信息 -->
            <div class="mb-8">
              <h2 class="form-section-title">基本信息</h2>
              <div class="space-y-5">
                <div>
                  <label for="video-title" class="form-label">视频标题 <span class="text-red-500">*</span></label>
                  <input type="text" id="video-title" name="title" class="form-input" placeholder="请输入视频标题" required autocomplete="off" />
                </div>
                <div>
                  <label for="video-course" class="form-label">所属课程</label>
                  <select id="video-course" name="course" class="form-input">
                    <option value="">请选择课程</option>
                  </select>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                  <div>
                    <label for="video-price" class="form-label">视频价格 (¥)</label>
                    <input type="number" id="video-price" name="price" class="form-input" placeholder="0" step="0.01" min="0" value="0" />
                  </div>
                  <div>
                    <label for="video-duration" class="form-label">视频时长 (分钟)</label>
                    <input type="number" id="video-duration" name="durationMinutes" class="form-input" placeholder="60" min="0" value="0" />
                  </div>
                </div>
                <div>
                  <label for="video-description" class="form-label">视频描述</label>
                  <textarea id="video-description" name="description" rows="4" class="form-input resize-y min-h-[100px]" placeholder="请输入视频描述..."></textarea>
                </div>
              </div>
            </div>

            <div class="flex flex-wrap items-center justify-end gap-3 pt-6 border-t border-gray-100">
              <a href="admin.html" class="btn-ghost">取消</a>
              <button type="submit" id="video-submit-btn" class="btn-primary">
                <iconify-icon icon="heroicons:cloud-arrow-up" class="text-lg"></iconify-icon>
                上传视频
              </button>
            </div>
          </form>
        </div>
      </main>
    </div>

    <script type="module" src="js/admin-video-upload.js"></script>
  </body>
</html>
